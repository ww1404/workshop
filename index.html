<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-sfda-green { background-color: #007A5E; }
        .bg-sfda-gold { background-color: #C5A059; }
        .text-sfda-green { color: #007A5E; }
    </style>
</head>
<body class="bg-gray-50 p-8">

    <!-- نافذة المعايرة المالية (Modal) -->
    <div id="finance-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl w-96 shadow-xl">
            <h3 class="font-bold text-sfda-green mb-4">⚙️ إعدادات الحساب المالي</h3>
            <label class="block text-xs mb-2">إجمالي الراتب الشهري (ر.س):</label>
            <input type="number" id="base-salary" value="15000" oninput="updateHourlyRate()" class="w-full p-2 border rounded-lg mb-4">
            <div class="bg-gray-100 p-4 rounded-lg text-sm text-center">
                تكلفة ساعة العمل: <span id="display-hourly" class="font-bold text-sfda-green text-lg">86.61 ر.س</span>
            </div>
            <button onclick="toggleFinanceModal()" class="w-full mt-6 bg-sfda-green text-white py-2 rounded-lg hover:opacity-90">حفظ وإغلاق</button>
        </div>
    </div>

    <!-- نموذج الإدخال (دمج وتلخيص) -->
    <section class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-sm mb-8">
        <h2 class="text-xl font-bold text-sfda-green mb-6">📝 إدخال فرصة تحسين</h2>
        <div class="grid grid-cols-2 gap-6">
            <!-- توصيف الخدمة -->
            <div class="col-span-2">
                <label class="block font-semibold mb-2">توصيف الخدمة والوحدة التنظيمية</label>
                <input type="text" placeholder="مثال: أتمتة إصدار التراخيص - إدارة التفتيش" class="w-full p-3 border rounded-lg">
            </div>
            <div>
                <label class="block font-semibold mb-2">اسم الموظف مقدم الفرصة</label>
                <input type="text" class="w-full p-3 border rounded-lg">
            </div>
            <!-- المقابل المالي والطاقة التشغيلية -->
            <div>
                <label class="block font-semibold mb-2">عدد الساعات المتوقعة للتنفيذ</label>
                <input type="number" class="w-full p-3 border rounded-lg">
            </div>
        </div>
    </section>

    <!-- تبويب المحفظة ومصفوفة التأثير -->
    <section class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">💼 محفظة الفرص ومصفوفة التأثير</h2>
            <button onclick="toggleFinanceModal()" class="bg-sfda-gold text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-yellow-700">
                ⚙️ إعدادات الحساب المالي
            </button>
        </div>
        
        <!-- مصفوفة التأثير الاستراتيجية (Impact Matrix) -->
        <div class="bg-white p-6 rounded-xl border border-gray-200">
            <div id="impact-matrix" class="grid grid-cols-2 gap-4 h-64 border-2 border-dashed border-gray-300 p-4 rounded-xl">
                <div class="border-l border-b border-gray-200 p-2">عالي الأثر / منخفض الجهد</div>
                <div class="border-b border-gray-200 p-2">عالي الأثر / عالي الجهد</div>
            </div>
        </div>
    </section>

    <script>
        function updateHourlyRate() {
            const salary = document.getElementById('base-salary').value;
            const hourly = (salary / 173.2).toFixed(2);
            document.getElementById('display-hourly').innerText = hourly + ' ر.س';
        }
        function toggleFinanceModal() {
            document.getElementById('finance-modal').classList.toggle('hidden');
        }
    </script>
</body>
</html>
